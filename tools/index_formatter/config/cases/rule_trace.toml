# Purpose:
# This file stores rule trace assertions.
# It verifies both the normalized output and which parse rule matched.
# Each [[rule_trace]] entry has:
# - raw_stem: input stem
# - expected_value: expected normalized stem
# - expected_rule: expected parse rule name (or omitted/null)
# - is_exempt: whether exemption logic was used
# - used_fallback: whether fallback cleanup was used

